# シミュレーション状態ファイル
# simulation/clock.py が読み書きする
# このファイルを直接編集するか、SimClock.set_date() / advance() で更新する

virtual_date: "2026-03-02"   # シミュレーション上の現在日付
sprint: "Sprint 1"            # 現在のスプリント名
day_in_sprint: 1              # スプリント開始からの日数（1 = 初日）

# ── タイムスタンプ乖離問題について ──────────────────────────────
# Jira REST APIは過去日時でのIssue作成に対応していない（フリープランの制限）。
# このため、Jira上の created_at は実際の登録日時（リアル）になる。
# シミュレーション上の「仮想日時」は以下の方法で管理する:
#
# 1. チケット本文の末尾に [🕐 仮想日時: YYYY-MM-DD / Sprint X Day N] を付与
# 2. ステータス変更・コメント追加時もタイムスタンプラベルを含める
# 3. このstate.yamlで仮想日時を管理し、スクリプトが参照する
#
# → これにより、Jira上の順序は実際の登録順になるが、
#   シミュレーション上の「いつ何が起きたか」は追跡可能になる
